<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="bgSheen" x1="0%" y1="0%" x2="40%" y2="40%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="12%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <filter id="irisGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect width="128" height="128" rx="28" fill="url(#bgSheen)"/>
  <g filter="url(#shadow)">
    <!-- Outer decoder ring -->
    <circle cx="64" cy="64" r="38" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.85"/>
    <!-- Outer tick marks (24 ticks) -->
    <g stroke="#ffffff" stroke-width="1.5" opacity="0.6">
      <line x1="64" y1="24" x2="64" y2="29"/>
      <line x1="73.8" y1="24.8" x2="73" y2="29.7"/>
      <line x1="83" y1="27.8" x2="81" y2="32.4"/>
      <line x1="90.7" y1="33" x2="87.5" y2="37"/>
      <line x1="96.2" y1="40.3" x2="92" y2="43.2"/>
      <line x1="99.2" y1="49.2" x2="94.5" y2="51"/>
      <line x1="100" y1="59" x2="95" y2="60"/>
      <line x1="100" y1="69" x2="95" y2="68"/>
      <line x1="99.2" y1="78.8" x2="94.5" y2="77"/>
      <line x1="96.2" y1="87.7" x2="92" y2="84.8"/>
      <line x1="90.7" y1="95" x2="87.5" y2="91"/>
      <line x1="83" y1="100.2" x2="81" y2="95.6"/>
      <line x1="73.8" y1="103.2" x2="73" y2="98.3"/>
      <line x1="64" y1="104" x2="64" y2="99"/>
      <line x1="54.2" y1="103.2" x2="55" y2="98.3"/>
      <line x1="45" y1="100.2" x2="47" y2="95.6"/>
      <line x1="37.3" y1="95" x2="40.5" y2="91"/>
      <line x1="31.8" y1="87.7" x2="36" y2="84.8"/>
      <line x1="28.8" y1="78.8" x2="33.5" y2="77"/>
      <line x1="28" y1="69" x2="33" y2="68"/>
      <line x1="28" y1="59" x2="33" y2="60"/>
      <line x1="28.8" y1="49.2" x2="33.5" y2="51"/>
      <line x1="31.8" y1="40.3" x2="36" y2="43.2"/>
      <line x1="37.3" y1="33" x2="40.5" y2="37"/>
    </g>
    <!-- Inner decoder ring (slightly rotated) -->
    <g transform="rotate(7.5, 64, 64)">
      <circle cx="64" cy="64" r="28" fill="none" stroke="#ffffff" stroke-width="1.8" opacity="0.6"/>
      <!-- Inner tick marks (12 ticks) -->
      <g stroke="#ffffff" stroke-width="1.2" opacity="0.4">
        <line x1="64" y1="36" x2="64" y2="40"/>
        <line x1="78" y1="40" x2="76" y2="43.5"/>
        <line x1="88" y1="54" x2="84.5" y2="55.5"/>
        <line x1="92" y1="64" x2="88" y2="64"/>
        <line x1="88" y1="74" x2="84.5" y2="72.5"/>
        <line x1="78" y1="88" x2="76" y2="84.5"/>
        <line x1="64" y1="92" x2="64" y2="88"/>
        <line x1="50" y1="88" x2="52" y2="84.5"/>
        <line x1="40" y1="74" x2="43.5" y2="72.5"/>
        <line x1="36" y1="64" x2="40" y2="64"/>
        <line x1="40" y1="54" x2="43.5" y2="55.5"/>
        <line x1="50" y1="40" x2="52" y2="43.5"/>
      </g>
    </g>
    <!-- Radiating lines from eye -->
    <g stroke="#ffffff" stroke-width="0.7" opacity="0.2">
      <line x1="64" y1="64" x2="64" y2="38"/>
      <line x1="64" y1="64" x2="84" y2="46"/>
      <line x1="64" y1="64" x2="90" y2="64"/>
      <line x1="64" y1="64" x2="84" y2="82"/>
      <line x1="64" y1="64" x2="64" y2="90"/>
      <line x1="64" y1="64" x2="44" y2="82"/>
      <line x1="64" y1="64" x2="38" y2="64"/>
      <line x1="64" y1="64" x2="44" y2="46"/>
    </g>
    <!-- Eye almond shape -->
    <path d="M44,64 Q54,50 64,50 Q74,50 84,64 Q74,78 64,78 Q54,78 44,64Z"
          fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-width="2" stroke-linejoin="round" opacity="0.9"/>
    <!-- Eye glow -->
    <circle cx="64" cy="64" r="14" fill="url(#eyeGlow)"/>
    <!-- Iris circle -->
    <circle cx="64" cy="64" r="9" fill="none" stroke="#ffffff" stroke-width="1.8" opacity="0.85"/>
    <!-- Keyhole/aperture in iris -->
    <circle cx="64" cy="62" r="3.5" fill="#ffffff" opacity="0.9" filter="url(#irisGlow)"/>
    <rect x="62.2" y="62" width="3.6" height="6" rx="1" fill="#ffffff" opacity="0.8"/>
    <!-- Pupil dot -->
    <circle cx="64" cy="62" r="1.5" fill="#065f46" opacity="0.9"/>
  </g>
</svg>